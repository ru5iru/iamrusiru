    <!-- Self-referential canonical + og:url. Lovable hosting serves this shell
         for every route, so without this, all routes would canonicalize to "/"
         (Google: "Alternate page with proper canonical tag"). This inline
         script runs before the React bundle and rewrites the canonical and
         og:url to the actual requested path so crawlers see a self-referential
         canonical even before useSEO runs. -->
    <script>
      (function () {
        try {
          var origin = "https://iamrusiru.lovable.app";
          var path = window.location.pathname.replace(/\/+$/, "") || "/";
          var url = origin + (path === "/" ? "/" : path);
          var c = document.querySelector('link[rel="canonical"]');
          if (c) c.setAttribute("href", url);
          var o = document.querySelector('meta[property="og:url"]');
          if (o) o.setAttribute("content", url);
        } catch (e) {}
      })();
    </script>
